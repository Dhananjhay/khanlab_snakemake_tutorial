# This tells Gitpod what to do when someone clicks your link
tasks:
  - name: Setup Environment
    init: |
      # 1. Install Snakemake and dependencies
      pip install snakemake graphviz
      # 2. Create the "Mock" BIDS data structure
      mkdir -p data
      touch data/sub-01_T1w.nii.gz data/sub-02_T1w.nii.gz data/sub-03_T1w.nii.gz
      echo "Environment ready! Type 'ls data' to see your files."
vscode:
  extensions:
    # This adds the official Snakemake syntax highlighting
    - snakemake.snakemake-lang